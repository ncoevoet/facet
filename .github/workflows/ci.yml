name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov fastapi[standard] httpx pyjwt pillow numpy scipy scikit-learn opencv-python-headless tqdm aiosqlite sqlite-vec
      - name: Run tests
        run: python -m pytest --tb=short -q --cov=api --cov=processing --cov=analyzers --cov=config --cov=utils --cov-report=term-missing

  angular-tests:
    name: Angular Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package.json
      - run: npm install --no-audit --no-fund
      - run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check api/ tests/ --select E,F,W --ignore E501
      - name: Type check (advisory)
        continue-on-error: true
        run: mypy api/
      - name: Forbid broken FastAPI auth mock pattern
        run: |
          # Catches both direct ("api.routers.albums.require_edition") and
          # f-string interpolated (f"{_ALBUMS_MODULE}.get_optional_user")
          # forms. Anchored on the auth function name, not the module prefix.
          if grep -rEn 'mock\.patch\([^)]*\.(require_[a-z_]+|get_optional_user)' tests/ ; then
            echo "::error::Found broken Pattern A — mock.patch on module-level FastAPI auth dependencies."
            echo "::error::These patches are no-ops against Depends()-captured references; tests will pass-by-accident."
            echo "Use the conftest fixtures (edition_client / regular_client / superadmin_client / anonymous_client)"
            echo "or app.dependency_overrides[require_edition] = lambda: ... instead. See tests/conftest.py."
            exit 1
          fi
      - name: Forbid Dockerfile COPY of untracked paths
        run: |
          # A clean clone contains only git-tracked files. If the Dockerfile
          # COPYs a path that isn't tracked (e.g. a leftover dir that only
          # exists on a contributor's machine), `docker build` fails on a fresh
          # checkout with `"/<path>": not found` (issue #10). Assert every local
          # COPY source is tracked. `--from=<stage>` COPYs read from a build
          # stage rather than the git context, so they are skipped.
          set -f
          fail=0
          while IFS= read -r line; do
            set -- $line
            shift                          # drop the COPY keyword
            srcs=(); from_stage=0
            for tok in "$@"; do
              case "$tok" in
                --from=*) from_stage=1 ;;
                --*) ;;                    # ignore other flags (e.g. --chown)
                *) srcs+=("$tok") ;;
              esac
            done
            [ "$from_stage" = 1 ] && continue
            (( ${#srcs[@]} >= 2 )) || continue
            unset 'srcs[${#srcs[@]}-1]'    # drop the destination (last token)
            for s in "${srcs[@]}"; do
              if [ -z "$(git ls-files -- "$s")" ]; then
                echo "::error file=Dockerfile::COPY source '$s' is not git-tracked; it is absent on a clean clone and the build will fail."
                fail=1
              fi
            done
          done < <(grep -iE '^[[:space:]]*COPY[[:space:]]' Dockerfile)
          [ "$fail" = 0 ] && echo "All Dockerfile COPY sources are git-tracked."
          exit $fail
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package.json
      - run: npm install --no-audit --no-fund
        working-directory: client
      - run: npx ng lint
        working-directory: client
