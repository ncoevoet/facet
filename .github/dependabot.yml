version: 2
updates:
  # ---- Python (root: requirements.txt + pyproject.toml) ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # transformers 5.3+ changed Qwen3.5 vision-token handling and breaks the
      # batched VLM tagger; 5.2.x is the validated ceiling (see requirements.txt).
      # Block minor+major so only 5.2.x patches are proposed (group-safe form).
      - dependency-name: "transformers"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      # Transitive sub-dependencies whose version is dictated by a parent's exact
      # pin/range: pydantic-core by pydantic, mpmath by sympy, tokenizers by
      # transformers. Bumping them on their own in requirements.lock.txt makes the
      # lock unresolvable (`pip install -r requirements.lock.txt` fails outright,
      # breaking the Docker build) — the whole #59 group was uninstallable for this
      # reason. Let the parent bump carry them; add any new offender the same way.
      - dependency-name: "pydantic-core"
      - dependency-name: "mpmath"
      - dependency-name: "tokenizers"
      # Majors are a deliberate, verified upgrade — never auto-propose them.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ---- Angular client (client/: package.json + package-lock.json) ----
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      angular:
        patterns:
          - "@angular*"
          - "angular-eslint"
        update-types:
          - "minor"
          - "patch"
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Majors are a deliberate, verified upgrade — never auto-propose them. Covers
      # the Angular 21->22 framework migration (a lone @angular/* major breaks
      # lockstep peer resolution) and typescript (pinned <6.0 by Angular's peers).
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ---- GitHub Actions workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- Docker base images (Dockerfile) ----
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps)"
    ignore:
      # CUDA/cudnn/torch combo is hand-matched to the GPU stack — never auto-bump.
      - dependency-name: "pytorch/pytorch"
      # Base-image majors are a deliberate build decision — keep majors pinned,
      # take only patch/minor rebuilds (e.g. alpine security rebuilds of node).
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
