version: 2
updates:
  # ---- Python (root: requirements.txt + pyproject.toml) ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- Angular client (client/: package.json + package-lock.json) ----
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      angular-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- GitHub Actions workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- Docker base images (Dockerfile) ----
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps)"
    ignore:
      # CUDA/cudnn/torch combo is hand-matched to the GPU stack — never auto-bump.
      - dependency-name: "pytorch/pytorch"
