version: 2
updates:
  # ---- Python (root: requirements.txt + pyproject.toml) ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # transformers 5.3+ changed Qwen3.5 vision-token handling and breaks the
      # batched VLM tagger; 5.2.x is the validated ceiling (see requirements.txt).
      # Block minor+major so only 5.2.x patches are proposed (group-safe form).
      - dependency-name: "transformers"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # ---- Angular client (client/: package.json + package-lock.json) ----
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      angular:
        patterns:
          - "@angular*"
          - "angular-eslint"
        update-types:
          - "minor"
          - "patch"
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Angular framework majors are a deliberate, coordinated migration — a lone
      # @angular/* major breaks lockstep peer resolution, so never auto-propose them.
      - dependency-name: "@angular*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "angular-eslint"
        update-types:
          - "version-update:semver-major"

  # ---- GitHub Actions workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- Docker base images (Dockerfile) ----
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps)"
    ignore:
      # CUDA/cudnn/torch combo is hand-matched to the GPU stack — never auto-bump.
      - dependency-name: "pytorch/pytorch"
      # node major bumps are a deliberate build-image decision — keep the major
      # pinned, take only alpine patch/minor rebuilds.
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
