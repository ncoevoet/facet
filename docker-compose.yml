services:
  facet:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./photos:/data/photos
      - ./data:/app/data
      - ./scoring_config.json:/app/scoring_config.json
      - ./storage:/app/storage
      - ./model-cache/huggingface:/home/facet/.cache/huggingface
      - ./model-cache/insightface:/home/facet/.insightface
      - ./model-cache/pretrained:/app/pretrained_models
    environment:
      - FACET_LOG_LEVEL=INFO
      - DB_PATH=/app/data/photo_scores_pro.db
    # GPU acceleration is opt-in. The default config runs in CPU mode so
    # `docker compose up` works on any machine. To enable an NVIDIA GPU
    # (requires the NVIDIA Container Toolkit), add the override file:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
